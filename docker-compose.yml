services:
  postgres:
    image: postgres:16-alpine
    container_name: admin_beautyup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: admin_beautyup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_beautyup"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin_beautyup_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/admin_beautyup?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
